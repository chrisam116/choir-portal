<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة استخراج أكواد الكورال</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Cairo Font) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            /* دمج صورة الكنيسة مع تدرج لوني زجاجي ناعم بنسبة شفافية لحماية تباين النصوص والعين */
            background: linear-gradient(rgba(241, 245, 249, 0.88), rgba(203, 213, 225, 0.88)), 
                        url('Church Light.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cairo', sans-serif;
            color: #1e293b;
            padding: 20px;
        }
        .portal-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
            max-width: 580px;
            width: 100%;
            transition: max-width 0.4s ease;
        }
        .input-group-custom {
            margin-bottom: 25px;
            text-align: right;
        }
        .input-group-custom label {
            font-size: 0.95rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
            display: block;
        }
        
        /* خدعة ذكية لضبط اتجاه مدخلات الاسم (الplaceholder يمين والكتابة يسار) */
        #nameInput {
            text-align: right;
            direction: rtl;
        }
        #nameInput:focus, #nameInput:not(:placeholder-shown) {
            direction: ltr !important;
            text-align: left !important;
        }

        .form-control-lg {
            border-radius: 16px;
            border: 2px solid #cbd5e1;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 1.05rem;
            color: #0f172a;
            transition: all 0.3s ease;
        }
        .form-control-lg:focus {
            border-color: #2563eb;
            background-color: #ffffff;
            color: #000;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }
        .btn-search {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            padding: 16px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.4);
            color: #fff;
        }
        /* تصميم كروت الأعضاء المطور بالوضع المضيء */
        .result-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 10px;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.04), 0 4px 6px -2px rgba(15, 23, 42, 0.02);
            text-align: center;
            position: relative;
            overflow: hidden;
            height: 100%;
        }
        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #2563eb, #8b5cf6);
        }
        .qr-section {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: inline-block;
            width: 100%;
        }
        .qr-img {
            max-width: 170px;
            border-radius: 12px;
            padding: 8px;
            background: #fff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            margin-bottom: 12px;
        }
        .member-badge {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 800;
            font-size: 1.1rem;
            padding: 6px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            display: inline-block;
            margin-bottom: 15px;
        }
        .status-badge {
            font-size: 0.95rem;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 10px;
            font-size: 0.8rem;
            color: #475569;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        .stat-card strong {
            font-size: 1.3rem;
            color: #0f172a;
            display: block;
            margin-top: 4px;
        }
        .accordion-item {
            border: 1px solid #e2e8f0;
            border-radius: 14px !important;
            margin-bottom: 8px;
            overflow: hidden;
            background: #ffffff;
        }
        .accordion-button {
            background: #ffffff;
            color: #475569;
            font-weight: 600;
            font-size: 0.88rem;
            padding: 12px 16px;
            font-family: 'Cairo', sans-serif;
        }
        .accordion-button:not(.collapsed) {
            background-color: #f8fafc;
            color: #2563eb;
        }
        .accordion-body {
            background: #f8fafc;
            color: #334155;
            padding: 15px;
        }
        .table-custom {
            color: #334155;
            font-size: 0.85rem;
            margin-bottom: 0;
        }
        .table-custom th {
            color: #475569;
            border-bottom: 2px solid #cbd5e1;
            background-color: #f1f5f9;
        }
        .table-custom td {
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }
        .btn-download {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 10px;
            font-size: 0.95rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            color: #fff;
        }
        /* الشريط السفلي الصغير المحسن */
        .footer-text {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 30px;
            opacity: 0.8;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="portal-card text-center" id="mainPortalCard">
    <h3 class="mb-2" style="color: #0f172a; font-weight: 800; letter-spacing: -0.5px;">بوابة التحقق واستخراج الأكواد</h3>
    <p class="text-muted small mb-4">يرجى ملء البيانات التالية للتحقق الآمن من هويتك وعرض تقرير حضورك</p>
    
    <div class="input-group-custom">
        <label>الاسم ثلاثي أو ثنائي كما هو مسجل</label>
        <input type="text" id="nameInput" class="form-control form-control-lg" placeholder="مثال: Chris Samuel">
    </div>
    
    <div class="input-group-custom">
        <label>آخر 4 أرقام من موبايلك المسجل به</label>
        <input type="tel" id="phoneInput" maxlength="4" class="form-control form-control-lg text-center" placeholder="مثال: 8843">
    </div>
    
    <button onclick="searchStudent()" class="btn btn-search btn-lg w-100 mb-4">استخراج تقرير الحضور والـ QR 🔍</button>

    <!-- منطقة عرض النتيجة التفاعلية المحدثة لتكون شبكة مرنة متراصة بالمنتصف -->
    <div id="resultArea" style="display: none; width: 100%;">
        <div id="cardsContainer" class="row g-4 justify-content-center w-100 m-0"></div>
    </div>

    <!-- الجزء الخاص بحقوق الملكية الصغير في الأسفل -->
    <div class="footer-text">
        Developed by Chris Samuel 2026 © All Rights Reserved
    </div>
</div>

<script>
    let studentsDatabase = [];

    // جلب ملف JSON المحدث تلقائياً من جيت هاب
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            studentsDatabase = data;
        })
        .catch(err => console.error("Error loading student database:", err));

    function normalizeArabic(text) {
        return text
            .replace(/[أإآا]/g, 'ا')
            .replace(/[ىي]/g, 'ي')
            .replace(/[ةه]/g, 'ه')
            .replace(/[\u064B-\u0652]/g, '')
            .trim()
            .toLowerCase();
    }

    function normalizePhone(phone) {
        return String(phone).replace(/\D/g, ''); 
    }

    function searchStudent() {
        const inputName = normalizeArabic(document.getElementById('nameInput').value.trim());
        const inputPhoneLast4 = document.getElementById('phoneInput').value.trim();
        const resultArea = document.getElementById('resultArea');
        const cardsContainer = document.getElementById('cardsContainer');
        const mainPortalCard = document.getElementById('mainPortalCard');
        
        cardsContainer.innerHTML = ""; 

        if (!inputName || !inputPhoneLast4 || inputPhoneLast4.length !== 4) {
            alert("من فضلك أدخل اسمك، مع كتابة آخر 4 أرقام من موبايلك المسجل بشكل صحيح (4 أرقام فقط).");
            return;
        }

        const queryWords = inputName.split(" ");
        let matches = studentsDatabase.filter(student => {
            const normalizedStudentName = normalizeArabic(student.name);
            const normalizedStudentPhone = normalizePhone(student.phone);
            const registeredLast4 = normalizedStudentPhone.slice(-4);

            const isNameMatch = queryWords.every(word => normalizedStudentName.includes(word));
            const isPhoneMatch = (registeredLast4 === inputPhoneLast4);

            return isNameMatch && isPhoneMatch;
        });

        if (matches.length > 0) {
            // ترتيب الكروت تصاعدياً بناءً على كود العازف لضمان تناسق الترتيب
            matches.sort((a, b) => parseInt(a.id) - parseInt(b.id));

            // تمديد عرض الكارت الرئيسي ليصبح عريضاً عند وجود نتائج متعددة لتظهر متجاورة بالمنتصف
            if (matches.length > 1) {
                mainPortalCard.style.maxWidth = "1140px";
            } else {
                mainPortalCard.style.maxWidth = "580px";
            }

            matches.forEach(student => {
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${student.id}`;
                
                // تحديد شكل وألوان حالة الالتزام بشكل ناعم وعصري في الوضع المضيء
                let badgeStyle = "background-color: #f0fdf4; color: #16a34a; border: 1.5px solid #bbf7d0;";
                if (student.commitment_status.includes("Dismissed")) {
                    badgeStyle = "background-color: #fef2f2; color: #dc2626; border: 1.5px solid #fca5a5;";
                } else if (student.commitment_status.includes("Danger")) {
                    badgeStyle = "background-color: #fff7ed; color: #ea580c; border: 1.5px solid #ffedd5;";
                } else if (student.commitment_status.includes("Warning")) {
                    badgeStyle = "background-color: #fef9c3; color: #ca8a04; border: 1.5px solid #fef08a;";
                }

                let attendedRows = student.attended_history.map(x => `<tr><td>${x.date}</td><td>${x.name}</td><td><span class="badge bg-success-subtle text-success border border-success-subtle">حاضر</span></td></tr>`).join("");
                if (!attendedRows) attendedRows = `<tr><td colspan="3" class="text-muted text-center py-3">لم يتم تسجيل حضور أي بروفات بعد</td></tr>`;

                let missedRows = student.missed_history.map(x => `<tr><td>${x.date}</td><td>${x.name}</td><td><span class="badge bg-danger-subtle text-danger border border-danger-subtle">غائب</span></td></tr>`).join("");
                if (!missedRows) missedRows = `<tr><td colspan="3" class="text-muted text-center py-3">ممتاز! لا يوجد غيابات بدون عذر</td></tr>`;

                let logsRows = student.history.map(x => `<tr><td>${x.date}</td><td><span class="badge bg-warning-subtle text-warning-emphasis border border-warning-subtle">${x.status}</span></td><td>${x.reason || "بدون سبب"}</td></tr>`).join("");
                if (!logsRows) logsRows = `<tr><td colspan="3" class="text-muted text-center py-3">سجل الطالب خالي من الأعذار والإنذارات</td></tr>`;

                // الحجم في الجوال يكون بكامل الشاشة، وفي الشاشات الكبيرة ينقسم لنصفين متجاورين متوسيطين
                const colSize = matches.length > 1 ? "col-12 col-md-6" : "col-12";

                const cardHtml = `
                    <div class="${colSize}">
                        <div class="result-card">
                            
                            <!-- 1. الاسم -->
                            <h4 style="color: #0f172a; font-weight: 800; font-size: 1.35rem;" class="mb-1">${student.name}</h4>
                            
                            <!-- 2. الكورال -->
                            <p class="mb-2 text-muted" style="font-size: 0.95rem;">الكورال: <strong style="color: #2563eb;">${student.choir}</strong></p>
                            
                            <!-- 3. حالة الالتزام -->
                            <div class="mb-3">
                                <span class="status-badge" style="${badgeStyle}">حالة الالتزام: ${student.commitment_status}</span>
                            </div>

                            <!-- 4. كود الحضور -->
                            <div class="member-badge mb-3">كود الحضور: ${student.id}</div>

                            <!-- 5 و6. الـ QR كود المربع الكبير وزرار التحميل في السنتر مباشرة تحت الكود -->
                            <div class="qr-section">
                                <div class="mb-3">
                                    <img src="${qrUrl}" class="qr-img" alt="QR Code">
                                </div>
                                <button onclick="downloadQR('${qrUrl}', '${student.name}_QR.png')" class="btn btn-download w-100">تحميل صورة الـ QR 📥</button>
                            </div>

                            <!-- 7. شبكة المؤشرات الرقمية التفاعلية -->
                            <div class="stat-grid">
                                <div class="stat-card">البروفات الجارية<strong>${student.total_sessions}</strong></div>
                                <div class="stat-card" style="background: #f0fdf4; border-color: #bbf7d0; font-weight: 600;">الحضور<strong style="color: #16a34a;">${student.attended}</strong></div>
                                <div class="stat-card" style="background: #fef2f2; border-color: #fca5a5; font-weight: 600;">الغياب الكلي<strong style="color: #dc2626;">${student.absent}</strong></div>
                            </div>
                            <div class="row g-2 mb-4 justify-content-center">
                                <div class="col-4"><div class="stat-card" style="background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.15);">غياب بعذر<strong style="color: #ea580c;">${student.excused_absences}</strong></div></div>
                                <div class="col-4"><div class="stat-card" style="background: rgba(37, 99, 235, 0.05); border-color: rgba(37, 99, 235, 0.15);">غياب امتحانات<strong style="color: #2563eb;">${student.exam_absences || 0}</strong></div></div>
                                <div class="col-4"><div class="stat-card">الإنذارات<strong style="color: #cbd5e1;">${student.warnings}</strong></div></div>
                            </div>

                            <!-- 8. القسم السفلي: السجلات التفاعلية (أكورديون) -->
                            <div class="accordion text-start" id="accordion-${student.id}">
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne-${student.id}">📅 سجل البروفات التي حضرها</button>
                                    </h2>
                                    <div id="collapseOne-${student.id}" class="accordion-collapse collapse" data-bs-parent="#accordion-${student.id}">
                                        <div class="accordion-body">
                                            <table class="table table-hover table-sm table-custom text-center">
                                                <thead><tr><th>التاريخ</th><th>اسم البروفة</th><th>الحالة</th></tr></thead>
                                                <tbody>${attendedRows}</tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo-${student.id}">❌ سجل الغيابات بدون عذر</button>
                                    </h2>
                                    <div id="collapseTwo-${student.id}" class="accordion-collapse collapse" data-bs-parent="#accordion-${student.id}">
                                        <div class="accordion-body">
                                            <table class="table table-hover table-sm table-custom text-center">
                                                <thead><tr><th>التاريخ</th><th>اسم البروفة</th><th>الحالة</th></tr></thead>
                                                <tbody>${missedRows}</tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                                <div class="accordion-item">
                                    <h2 class="accordion-header">
                                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseThree-${student.id}">📝 سجل الأعذار والتأخير والإنذارات</button>
                                    </h2>
                                    <div id="collapseThree-${student.id}" class="accordion-collapse collapse" data-bs-parent="#accordion-${student.id}">
                                        <div class="accordion-body">
                                            <table class="table table-hover table-sm table-custom text-center">
                                                <thead><tr><th>التاريخ</th><th>الحدث</th><th>التفاصيل/السبب</th></tr></thead>
                                                <tbody>${logsRows}</tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                `;
                cardsContainer.innerHTML += cardHtml;
            });

            resultArea.style.display = 'flex';
        } else {
            alert("عذراً، البيانات غير متطابقة. يرجى التأكد من كتابة الاسم وآخر 4 أرقام من موبايلك بشكل صحيح.");
            resultArea.style.display = 'none';
            mainPortalCard.style.maxWidth = "580px";
        }
    }

    async function downloadQR(url, filename) {
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        } catch (error) {
            console.error("Download failed:", error);
        }
    }
</script>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
